<link rel="stylesheet" type="text/css" href="css/contacto.css">

<h4 style="text-align: center;">Cómo contactarnos 📧</h4>

<div class="row">

    <div class="col-6 contact-card">
        <h6>Email</h6>
        <img 
            src="images/contacto/gmail.webp" 
            class="contact-icon border border-dark border-1"
        >
        <span class="email"></span>
    </div>

    <div class="col-6 contact-card">
        <h6>Teléfono</h6>
        <img 
            src="images/contacto/whatsapp.webp" 
            class="contact-icon border border-dark border-1"
        >
        <span class="telefono"></span>
    </div>

</div>


<h4 style="text-align: center;">Encuéntranos en 📍</h4>

<div class="container my-5">
  <div class="row">
    

    <div class="col-lg-4 col-md-12 mb-4">

      <!-- Dirección física -->
      <p>
        <i class="fas fa-map-marker-alt fa-fw text-danger"></i>
        <strong>Dirección:</strong> <span>Calle Real 123</span>
      </p>

      <!-- Horario de atención -->
      <p>
        <i class="fas fa-clock fa-fw text-warning"></i>
        <strong>Horario de atención:</strong><br>
        <span>Lunes a Viernes • 09:00 a 13:00 • 14:00 a 18:00</span>
      </p>

    </div>

    <!-- Mapa -->
    <div class="col-lg-8 col-md-12">

      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3278.821273850503!2d-58.39412769373692!3d-34.73489917347711!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95bccd5ebe0f6829%3A0x77634d225a40f10a!2sUniversidad%20Nacional%20de%20Lan%C3%BAs!5e0!3m2!1ses-419!2sar!4v1753214751636!5m2!1ses-419!2sar" 
        width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy" 
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>

    </div>

  </div>
</div>
